# local replacement for AWS S3.
# MinIO is S3-API-compatible. a post-start job creates the same bucket name
# terraform used: "ai-code-reviewer-reports".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  labels: { app: minio, tier: data-plane, replaces: aws-s3 }
spec:
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER, value: minioadmin }
            - { name: MINIO_ROOT_PASSWORD, value: minioadmin }
          ports:
            - { containerPort: 9000 }
            - { containerPort: 9001 }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  selector: { app: minio }
  ports:
    - { name: s3, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001, nodePort: 30901 }
  type: NodePort
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-make-bucket
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 minioadmin minioadmin; do
                echo "waiting for minio..."; sleep 2;
              done
              mc mb --ignore-existing local/ai-code-reviewer-reports
              echo "bucket ready: ai-code-reviewer-reports"
