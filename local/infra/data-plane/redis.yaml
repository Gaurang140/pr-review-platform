# local replacement for AWS ElastiCache (Redis 7).
# same engine/version as the ElastiCache cluster in infra/terraform/main.tf.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels: { app: redis, tier: data-plane, replaces: aws-elasticache }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: 6379 } ]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector: { app: redis }
  ports: [ { port: 6379, targetPort: 6379 } ]
