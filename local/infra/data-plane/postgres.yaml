# local replacement for AWS RDS (PostgreSQL 15).
# same engine/version as the RDS instance in infra/terraform/main.tf.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels: { app: postgres, tier: data-plane, replaces: aws-rds }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          env:
            - { name: POSTGRES_USER, value: dbadmin }
            - { name: POSTGRES_PASSWORD, value: localdevpassword }
            - { name: POSTGRES_DB, value: codereviewer }
          ports: [ { containerPort: 5432 } ]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "dbadmin", "-d", "codereviewer"] }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector: { app: postgres }
  ports: [ { port: 5432, targetPort: 5432 } ]
