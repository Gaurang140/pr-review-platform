apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
# reference only. the real secret is created out of band, never committed:
#   local -> local/sync-secret.sh   (reads local/.env + the .pem)
#   aws   -> kubectl create secret  (see DOCUMENTATION/aws-deployment.md, step 6)
# copy to secret.yaml and fill in if you prefer applying it directly.
stringData:
  DATABASE_URL: "postgresql+asyncpg://dbadmin:REPLACE_ME@your-db-host/codereviewer"
  GITHUB_APP_ID: "REPLACE_ME"
  GITHUB_WEBHOOK_SECRET: "REPLACE_ME"
  GITHUB_APP_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_ME
    -----END RSA PRIVATE KEY-----
  GROQ_API_KEY: "REPLACE_ME"
  OPENAI_API_KEY: "REPLACE_ME"          # same Groq key (groq speaks the openai api)
  LANGFUSE_PUBLIC_KEY: "REPLACE_ME"
  LANGFUSE_SECRET_KEY: "REPLACE_ME"
