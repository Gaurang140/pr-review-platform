apiVersion: v1
kind: Service
metadata:
  name: gateway-nodeport
# kind maps host 8080 -> nodePort 30080 (see local/infra/kind-config.yaml),
# so the gateway is reachable at http://localhost:8080.
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
